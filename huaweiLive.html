<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>视频帧提取工具 - 提取MP4第一帧为JPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f6 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            max-width: 860px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            background: #1e2a3e;
            background: linear-gradient(135deg, #0f2b3d 0%, #1b3b4f 100%);
            padding: 1.6rem 2rem;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "🎬";
            font-size: 1.8rem;
            font-weight: normal;
        }

        .header p {
            margin-top: 0.5rem;
            opacity: 0.85;
            font-size: 0.9rem;
        }

        .content {
            padding: 2rem;
        }

        .upload-zone {
            background: #f8fafd;
            border: 2px dashed #b9cee4;
            border-radius: 1.5rem;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }

        .upload-zone:hover {
            border-color: #3b82f6;
            background: #f0f6ff;
        }

        .upload-zone.drag-over {
            border-color: #2563eb;
            background: #e6f0ff;
            transform: scale(0.99);
        }

        .upload-icon {
            font-size: 3.2rem;
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 1rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 0.8rem;
            color: #5f7f9e;
            margin-top: 8px;
        }

        .file-input {
            display: none;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: #eef2ff;
            border: 1px solid #cddae9;
            color: #1f3a5f;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .preview-area {
            background: #f1f5f9;
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: center;
        }

        .preview-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b6b8f;
            margin-bottom: 1rem;
        }

        .canvas-wrapper {
            background: #0b1120;
            border-radius: 1rem;
            display: inline-block;
            padding: 4px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            max-width: 100%;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            margin: 0 auto;
            background: #000;
        }

        .info-panel {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #2c5a7a;
            background: #e9f0f8;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-bar {
            margin-top: 1.8rem;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #2563eb;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            padding: 0.5rem;
            border-radius: 40px;
            text-align: center;
            background: #f1f5f9;
            color: #334155;
        }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
        }

        .success-msg {
            background: #dcfce7;
            color: #15803d;
        }

        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.7rem;
            color: #6c8db0;
            border-top: 1px solid #e2edf7;
            background: #fcfdff;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>帧捕获工坊</h1>
        <p>提取 MP4 视频的第一帧，保存为高清 JPG 图片</p>
    </div>

    <div class="content">
        <!-- 上传区域（支持点击 & 拖拽） -->
        <div id="dropZone" class="upload-zone">
            <div class="upload-icon">📂🎥</div>
            <div class="upload-text">点击或拖拽视频文件至此区域</div>
            <div class="upload-hint">支持 MP4 格式，其他常见视频格式也可尝试</div>
            <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/x-msvideo,video/*" class="file-input" />
        </div>

        <!-- 预览 & 结果区域 -->
        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-title">✨ 提取的第一帧 ✨</div>
            <div class="canvas-wrapper">
                <canvas id="frameCanvas" style="width: auto; max-height: 320px;"></canvas>
            </div>
            <div id="frameInfo" class="info-panel">
                <span>🖼️ 等待提取</span>
            </div>
            <div class="action-bar">
                <button id="saveBtn" class="btn-primary" disabled>💾 保存为 JPG 图片</button>
                <button id="resetBtn" class="btn-secondary">⟳ 重新选择</button>
            </div>
            <div id="statusMsg" class="status-msg"></div>
        </div>

        <!-- 初始占位提示（无视频时显示） -->
        <div id="placeholderHint" class="status-msg" style="background: #eef2f6;">
            💡 上传 MP4 视频，自动提取第一帧并支持下载
        </div>
    </div>
    <footer>
        ⚡ 纯前端实现 | 第一帧提取后无损保存 | 视频仅在本地处理，隐私安全
    </footer>
</div>

<script>
    (function(){
        // DOM 元素
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const placeholderHint = document.getElementById('placeholderHint');
        const frameCanvas = document.getElementById('frameCanvas');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const frameInfo = document.getElementById('frameInfo');
        const statusMsgDiv = document.getElementById('statusMsg');

        // 全局状态
        let currentVideoURL = null;          // 当前blob url
        let currentVideoElement = null;       // 临时video元素引用（用于清理）
        let extractedBlob = null;              // 保存生成的图片blob (可选)
        let isProcessing = false;               // 防止并发处理
        let canvasReady = false;                // 是否已成功绘制有效帧

        // 辅助函数：显示状态消息（可带样式）
        function showMessage(msg, isError = false) {
            if (!statusMsgDiv) return;
            statusMsgDiv.innerText = msg;
            statusMsgDiv.classList.remove('error-msg', 'success-msg');
            if (isError) {
                statusMsgDiv.classList.add('error-msg');
            } else {
                statusMsgDiv.classList.add('success-msg');
            }
            // 如果预览区域隐藏但需要显示错误，不妨确保显示区域可看到消息（但是预览区未显示时，消息显示在placeholder下面不太对）
            if (!previewArea.style.display || previewArea.style.display === 'none') {
                // 如果还没有显示预览区，把错误也展示在占位提示附近，复制一份到占位区? 
                if (placeholderHint) {
                    if (isError) {
                        placeholderHint.innerHTML = `⚠️ ${msg}`;
                        placeholderHint.style.background = '#fee2e2';
                        placeholderHint.style.color = '#b91c1c';
                    } else {
                        placeholderHint.innerHTML = `💡 ${msg}`;
                        placeholderHint.style.background = '#eef2f6';
                        placeholderHint.style.color = '#334155';
                    }
                }
            } else {
                // 正常展示在状态栏
                // 占位提示已经隐藏，不用额外处理
            }
        }

        function clearStatusMessage() {
            if (statusMsgDiv) {
                statusMsgDiv.innerText = '';
                statusMsgDiv.classList.remove('error-msg', 'success-msg');
            }
            if (placeholderHint && (!previewArea.style.display || previewArea.style.display === 'none')) {
                placeholderHint.innerHTML = `💡 上传 MP4 视频，自动提取第一帧并支持下载`;
                placeholderHint.style.background = '#eef2f6';
                placeholderHint.style.color = '#334155';
            }
        }

        // 清理之前的视频资源，防止内存泄漏
        function cleanupVideoResources() {
            if (currentVideoElement) {
                // 移除所有事件监听（可选，通过替换新元素自动废弃）
                try {
                    currentVideoElement.pause();
                    currentVideoElement.src = '';
                    currentVideoElement.load(); // 重置
                } catch(e) {}
                if (currentVideoElement.parentNode) {
                    currentVideoElement.parentNode.removeChild(currentVideoElement);
                }
                currentVideoElement = null;
            }
            if (currentVideoURL) {
                URL.revokeObjectURL(currentVideoURL);
                currentVideoURL = null;
            }
        }

        // 重置界面状态 (不清除预览区域显示，但清除canvas绘图并禁用保存)
        function resetUIState() {
            // 清空 canvas
            const ctx = frameCanvas.getContext('2d');
            ctx.clearRect(0, 0, frameCanvas.width, frameCanvas.height);
            frameCanvas.width = 0;
            frameCanvas.height = 0;
            if (frameInfo) frameInfo.innerHTML = `<span>🖼️ 暂无帧数据</span>`;
            saveBtn.disabled = true;
            canvasReady = false;
            extractedBlob = null;
            clearStatusMessage();
        }

        // 显示预览区域
        function showPreviewPanel() {
            if (previewArea.style.display === 'none') {
                previewArea.style.display = 'block';
            }
            if (placeholderHint) placeholderHint.style.display = 'none';
        }

        function hidePreviewPanel() {
            if (placeholderHint) placeholderHint.style.display = 'block';
            previewArea.style.display = 'none';
        }

        // 核心: 提取视频第一帧并绘制到 canvas
        async function extractFirstFrameFromFile(file) {
            // 基本校验
            if (!file || (!file.type.includes('video') && !file.name.match(/\.(mp4|mov|avi|mkv|webm)$/i))) {
                throw new Error('请选择一个有效的视频文件（推荐 MP4 格式）');
            }
            
            // 显示处理中状态
            showMessage('⏳ 正在加载视频并提取第一帧，请稍候...', false);
            isProcessing = true;
            resetUIState();
            
            // 清理旧资源
            cleanupVideoResources();
            
            // 创建新的 video 元素 (隐藏方式: 添加到body但不可见且不影响布局)
            const video = document.createElement('video');
            currentVideoElement = video;
            // 确保静音并且不自动播放
            video.muted = true;
            video.preload = 'auto';
            video.crossOrigin = 'Anonymous';  // 对于本地blob无影响，但避免潜在CORS
            // 将video置于页面之外但保证渲染可用 (不能 display:none，会导致无法绘制帧)
            video.style.position = 'fixed';
            video.style.top = '-1000px';
            video.style.left = '-1000px';
            video.style.width = '1px';
            video.style.height = '1px';
            video.style.opacity = '0';
            video.style.pointerEvents = 'none';
            document.body.appendChild(video);
            
            // 创建对象URL
            const objectURL = URL.createObjectURL(file);
            currentVideoURL = objectURL;
            video.src = objectURL;
            
            // 定义promise等待第一帧就绪
            return new Promise((resolve, reject) => {
                let isResolved = false;
                let timeoutId = null;
                
                // 超时保护 (10秒)
                timeoutId = setTimeout(() => {
                    if (!isResolved) {
                        isResolved = true;
                        reject(new Error('视频加载超时，请检查文件格式或大小'));
                    }
                }, 12000);
                
                // 视频元数据加载完成
                const onLoadedMetadata = () => {
                    if (isResolved) return;
                    // 校验是否有视频轨道
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        clearTimeout(timeoutId);
                        reject(new Error('无法获取视频尺寸，可能视频轨道损坏或非视频文件'));
                        return;
                    }
                    // 设置 currentTime = 0 以定位到第一帧
                    video.currentTime = 0;
                };
                
                // seeked 事件：已经跳转到指定时间，帧可用
                const onSeeked = () => {
                    if (isResolved) return;
                    // 再次确保视频已经准备好画面
                    if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
                        // 额外等待一帧绘制，避免极少数情况未渲染
                        requestAnimationFrame(() => {
                            if (isResolved) return;
                            clearTimeout(timeoutId);
                            // 绘制到 canvas
                            try {
                                const canvas = frameCanvas;
                                const width = video.videoWidth;
                                const height = video.videoHeight;
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(video, 0, 0, width, height);
                                // 显示尺寸信息
                                if (frameInfo) {
                                    frameInfo.innerHTML = `<span>📐 分辨率: ${width} x ${height} 像素 | 🎞️ 第一帧已提取</span>`;
                                }
                                canvasReady = true;
                                // 额外生成blob预览以备保存，也可以保存时动态生成，但提前生成方便
                                // 直接保存时基于canvas再次toDataURL即可
                                resolve({ success: true, width, height });
                            } catch (drawErr) {
                                reject(new Error('绘制帧失败: ' + drawErr.message));
                            }
                        });
                    } else {
                        // 如果readyState不够，再等待一小段时间
                        setTimeout(() => {
                            if (isResolved) return;
                            if (video.videoWidth && video.videoHeight) {
                                requestAnimationFrame(() => {
                                    const canvas = frameCanvas;
                                    canvas.width = video.videoWidth;
                                    canvas.height = video.videoHeight;
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
                                    if (frameInfo) frameInfo.innerHTML = `<span>📐 分辨率: ${video.videoWidth} x ${video.videoHeight}  | 第一帧就绪</span>`;
                                    canvasReady = true;
                                    resolve({ success: true, width: video.videoWidth, height: video.videoHeight });
                                });
                            } else {
                                reject(new Error('无法获取视频帧数据'));
                            }
                        }, 50);
                    }
                };
                
                // 错误捕获
                const onError = (e) => {
                    if (isResolved) return;
                    clearTimeout(timeoutId);
                    reject(new Error('视频加载失败，文件可能损坏或编码不支持'));
                };
                
                // 注册事件
                video.addEventListener('loadedmetadata', onLoadedMetadata, { once: true });
                video.addEventListener('seeked', onSeeked, { once: true });
                video.addEventListener('error', onError, { once: true });
                
                // 某些视频可能已经可以播放且seeked未触发? 增加后备: 如果loadedmetadata后手动设置currentTime, seeked必触发。但如果readyState高且时间已经是0？
                // 极少数情况，若视频时长非常短且直接seek完成时已经处于0，seeked可能不触发？不过设置currentTime=0后总会触发seeked。
                // 额外保险: 若loadedmetadata后超过1秒未触发seeked, 强制再尝试一次
                let fallbackTimer = null;
                const resetFallback = () => {
                    if (fallbackTimer) clearTimeout(fallbackTimer);
                    fallbackTimer = setTimeout(() => {
                        if (!isResolved && video && video.readyState >= 1) {
                            if (!video.seeking && video.currentTime === 0) {
                                // 手动触发类似seeked的行为
                                video.dispatchEvent(new Event('seeked'));
                            }
                        }
                    }, 800);
                };
                video.addEventListener('loadedmetadata', resetFallback);
                video.addEventListener('seeked', () => {
                    if (fallbackTimer) clearTimeout(fallbackTimer);
                });
            });
        }
        
        // 处理上传的文件流（主逻辑）
        async function handleFile(file) {
            if (!file) return;
            if (isProcessing) {
                showMessage('请稍后，正在处理中...', false);
                return;
            }
            
            // 重置预览区可见性
            showPreviewPanel();
            resetUIState();
            saveBtn.disabled = true;
            
            try {
                const result = await extractFirstFrameFromFile(file);
                if (result && result.success) {
                    showMessage(`✅ 第一帧提取成功！分辨率 ${result.width} x ${result.height}，可保存为JPG`, false);
                    saveBtn.disabled = false;
                    canvasReady = true;
                } else {
                    throw new Error('提取失败，未获得有效帧');
                }
            } catch (err) {
                console.error(err);
                showMessage(`❌ 提取失败: ${err.message}`, true);
                canvasReady = false;
                saveBtn.disabled = true;
                // 清空canvas区域并显示错误占位
                const ctx = frameCanvas.getContext('2d');
                ctx.clearRect(0, 0, frameCanvas.width, frameCanvas.height);
                frameCanvas.width = 300;
                frameCanvas.height = 150;
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, frameCanvas.width, frameCanvas.height);
                ctx.fillStyle = '#ef4444';
                ctx.font = '14px sans-serif';
                ctx.fillText('无法提取第一帧', 20, 80);
                if (frameInfo) frameInfo.innerHTML = `<span>⚠️ 提取失败: ${err.message.substring(0, 60)}</span>`;
            } finally {
                isProcessing = false;
                // 清理video资源但不立即清除currentVideoElement已经在extractFirstFrameFromFile中保留，但是之后可以保留以便垃圾回收
                // 注意不要revoke URL太早，因为video元素还在后台，但绘制已经完成，可以安全清理video资源节省内存
                if (currentVideoElement) {
                    // 延迟一点清理避免影响已经绘制的内容
                    setTimeout(() => {
                        if (currentVideoElement) {
                            try {
                                currentVideoElement.pause();
                                currentVideoElement.src = '';
                                currentVideoElement.load();
                                if (currentVideoElement.parentNode) currentVideoElement.parentNode.removeChild(currentVideoElement);
                            } catch(e) {}
                            currentVideoElement = null;
                        }
                        if (currentVideoURL) {
                            URL.revokeObjectURL(currentVideoURL);
                            currentVideoURL = null;
                        }
                    }, 200);
                }
            }
        }
        
        // 保存canvas为JPG图片
        function saveCanvasAsJPG() {
            if (!canvasReady || !frameCanvas || frameCanvas.width === 0) {
                showMessage('没有可用的帧图片，请先上传视频并等待提取完成', true);
                return;
            }
            try {
                // 默认高质量 jpeg 0.92
                const dataURL = frameCanvas.toDataURL('image/jpeg', 0.92);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
                const filename = `video_frame_${timestamp}.jpg`;
                link.download = filename;
                link.href = dataURL;
                link.click();
                showMessage(`📸 已保存为 ${filename}`, false);
            } catch (err) {
                console.error(err);
                showMessage('保存失败，可能浏览器限制或canvas内容异常', true);
            }
        }
        
        // 重置/重新选择
        function resetAndClear() {
            cleanupVideoResources();
            resetUIState();
            hidePreviewPanel();
            // 重置文件输入
            if (fileInput) fileInput.value = '';
            isProcessing = false;
            canvasReady = false;
            showMessage('', false);
            if (placeholderHint) {
                placeholderHint.style.display = 'block';
                placeholderHint.innerHTML = `💡 上传 MP4 视频，自动提取第一帧并支持下载`;
                placeholderHint.style.background = '#eef2f6';
                placeholderHint.style.color = '#334155';
            }
            // 清空canvas彻底
            const ctx = frameCanvas.getContext('2d');
            ctx.clearRect(0, 0, frameCanvas.width, frameCanvas.height);
            frameCanvas.width = 0;
            frameCanvas.height = 0;
            if (frameInfo) frameInfo.innerHTML = `<span>🖼️ 等待提取</span>`;
            saveBtn.disabled = true;
        }
        
        // ---------- 事件绑定 ----------
        // 点击上传区域触发文件选择
        dropZone.addEventListener('click', (e) => {
            if (e.target === dropZone || dropZone.contains(e.target)) {
                fileInput.click();
            }
        });
        
        // 文件选择变化
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                const file = e.target.files[0];
                handleFile(file);
            }
        });
        
        // 保存按钮
        saveBtn.addEventListener('click', saveCanvasAsJPG);
        
        // 重置按钮
        resetBtn.addEventListener('click', resetAndClear);
        
        // 拖拽上传支持
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });
        
        function highlight() {
            dropZone.classList.add('drag-over');
        }
        
        function unhighlight() {
            dropZone.classList.remove('drag-over');
        }
        
        dropZone.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (file.type.includes('video') || file.name.match(/\.(mp4|mov|avi|mkv|webm)$/i)) {
                    handleFile(file);
                    if (fileInput) {
                        // 同步文件输入框
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;
                    }
                } else {
                    showMessage('请拖入有效的视频文件（MP4等格式）', true);
                }
            }
        }
        
        // 初始化显示占位
        hidePreviewPanel();  // 一开始显示占位
        resetUIState();
    })();
</script>
</body>
</html>
